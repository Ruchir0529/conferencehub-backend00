# ========================================

# Conference Hub - Application Configuration

# Works both locally and on Railway

# ========================================

# Server — Railway injects PORT automatically

server.port=${PORT:8080}
server.servlet.context-path=/api

# ========================================

# Database — FIXED (Railway compatible)

# ========================================

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:conferencehub}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool — important for Railway free tier

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ========================================

# JPA / Hibernate

# ========================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ========================================

# File Upload

# ========================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# ========================================

# JWT

# ========================================

jwt.secret=${JWT_SECRET:ConferenceHubSecretKey2024VeryLongAndSecureKeyForJWTSigning}
jwt.expiration=86400000

# ========================================

# Logging

# ========================================

logging.level.com.conferencehub=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
